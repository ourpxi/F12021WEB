<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando Alonso</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/themes.css">
</head>
<body class="theme-alpine">

<input type="checkbox" id="nav-toggle" class="nav-toggle">

<header>
    <div class="header-left">
        <a href="/index.html">
            <img src="/img/icons/f1.png" class="logo-f1" alt="F1 Logo">
        </a>
    </div>

    <div class="header-center">
        <nav>
            <ul class="nav-lvl-1">
                <li><a href="/index.html">INICIO</a></li>
                <!-- menu items preserved; root-relative paths -->
                <li><a href="/gallery.html">GALERÍA</a></li>
                <li><a href="/contacto.html">CONTACTO</a></li>
            </ul>
        </nav>
    </div>

    <div class="header-right">
        <label for="nav-toggle" class="hamburger" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
        </label>
    </div>
</header>

  <main class="snap-container">
        
        <section id="hero-driver" class="section-hero" style="background-image: linear-gradient(#000000b3, #0000002f), url('/img/repo/alonso.jpg'); background-size: cover; background-position: center;">
            <div class="profile-layout">
                <img src="/img/drivers/alonso_inspyrenet.png" class="img-glass" alt="Fernando Alonso">
                <div class="profile-info">
                    <h1 class="hero-title">EL NANO #14</h1>
                    <div class="card-md3 card-glass-light">
                        <p>Fernando Alonso. El bicampeón del mundo regresó a la máxima categoría con Alpine en 2021.</p>
                        <div class="stats-grid">
                            <div class="stat-card"><span class="stat-number">0</span><span class="stat-label">Victorias</span></div>
                            <div class="stat-card"><span class="stat-number">1</span><span class="stat-label">Podio</span></div>
                            <div class="stat-card"><span class="stat-number">0</span><span class="stat-label">Pole Positions</span></div>
                            <div class="stat-card"><span class="stat-number">81</span><span class="stat-label">Puntos Finales</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="history" class="section-dark" style="background-image: linear-gradient(#000000b3, #0000002f), url('/img/repo/alonso1.jpg'); background-size: cover; background-position: center;">
            <div class="profile-layout profile-layout--reverse">
                <div class="profile-info">
                    <h2 class="section-title">EL PLAN <br> EN MARCHA</h2>
                    <div class="card-md3 card-glass-light">
                        <p>Siete años después, Fernando volvió al podio en el GP de Qatar.</p>
                        <a href="#gallery" class="btn-md3">VER GALERÍA</a>
                    </div>
                </div>
                <img src="/img/repo/alonso3.jpg" class="img-xl" alt="Alonso en pista">
            </div>
        </section>

    </main>

    <footer>
        <a href="/index.html">Volver</a>
    </footer>

</body>
</html>
